<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers | IAFER</title>
    <meta name="description" content="Publications and articles from the IAFER research group">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/papers-list.css">
    <link rel="stylesheet" href="../css/navbar.css">
</head>
<body class="papers-page">
    <div id="navbar-root"></div>

    <div class="page-wrapper">
        <!-- Header -->
        <header class="page-header">
            <h1>Papers</h1>
            <p>Publications from the IAFER research group</p>
        </header>

        <!-- Search -->
        <div class="search-bar">
            <span class="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                </svg>
            </span>
            <input type="text" id="search-input" placeholder="Search by title, author, or keyword..." autocomplete="off">
        </div>

        <!-- Tag filters -->
        <div class="tags-filter" id="tags-filter"></div>

        <!-- Results info -->
        <div class="results-info" id="results-info"></div>

        <!-- Paper list -->
        <div class="papers-list" id="papers-list"></div>

        <!-- Empty state -->
        <div class="empty-state" id="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/>
            </svg>
            <p>No papers found matching these criteria.</p>
        </div>

        <!-- Footer -->
        <footer class="page-footer">
            <p>&copy; 2026 <a href="../index.html">IAFER Chair</a> &mdash; University of Granada</p>
        </footer>
    </div>

    <script>
    (function () {
        'use strict';

        /* ── State ── */
        let papers = [];
        let allTags = [];
        let activeTags = new Set();
        let searchQuery = '';

        /* ── DOM refs ── */
        const searchInput   = document.getElementById('search-input');
        const tagsContainer = document.getElementById('tags-filter');
        const listContainer = document.getElementById('papers-list');
        const emptyState    = document.getElementById('empty-state');
        const resultsInfo   = document.getElementById('results-info');

        /* ── Load data ── */
        async function loadPapers() {
            try {
                console.log('📚 Intentando cargar desde API /api/papers...');
                const apiRes = await fetch('/api/papers', {
                    signal: AbortSignal.timeout(3000)
                });

                if (apiRes.ok) {
                    const data = await apiRes.json();
                    papers = (data.papers || []).sort((a, b) => b.year - a.year);
                    console.log('✓ Papers cargados desde API dinámicamente:', papers.length);
                } else {
                    throw new Error('API no disponible');
                }
            } catch (apiError) {
                console.warn('⚠️ API no disponible, usando fallback a JSON estático:', apiError.message);
                try {
                    const res = await fetch('../data/papers.json');
                    if (!res.ok) throw new Error(res.status);
                    const data = await res.json();
                    papers = (data.papers || []).sort((a, b) => b.year - a.year);
                    console.log('✓ Papers cargados desde JSON estático:', papers.length);
                } catch (e) {
                    console.error('❌ Error cargando papers:', e);
                    papers = [];
                }
            }

            // Collect unique tags
            const tagSet = new Set();
            papers.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
            allTags = [...tagSet].sort();

            renderTags();
            renderList();
        }

        /* ── Render tag pills ── */
        function renderTags() {
            const hasGithubPapers = papers.some(p => p.github_url || p.metadata?.github_url);

            let tagsHtml = allTags.map(tag => {
                const active = activeTags.has(tag) ? ' active' : '';
                return `<button class="tag-btn${active}" data-tag="${tag}">${tag}</button>`;
            }).join('');

            if (hasGithubPapers) {
                const githubActive = activeTags.has('__github__') ? ' active' : '';
                tagsHtml += `<button class="tag-btn github-tag${githubActive}" data-tag="__github__" style="background:#f5f5f5;border-color:#333;color:#333;"><img src="../images/github-logo.svg" alt="GitHub" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;">GitHub</button>`;
            }

            tagsContainer.innerHTML = tagsHtml;
        }

        /* ── Render paper list ── */
        function renderList() {
            const filtered = getFilteredPapers();

            listContainer.innerHTML = filtered.map(p => {
                const tagsHtml = (p.tags || []).map(t =>
                    `<span class="paper-tag">${t}</span>`
                ).join('');

                const venue = p.venue ? `<span class="paper-venue">${p.venue}</span>` : '';
                const githubUrl = p.github_url || p.metadata?.github_url;
                const linkOpen = p.paper_url ? `<a href="${p.paper_url}" target="_blank" rel="noopener noreferrer" class="paper-title-link">` : '<div class="paper-title-link">';
                const linkClose = p.paper_url ? '</a>' : '</div>';

                return `
                <div class="paper-item" data-id="${p.id}">
                    <div class="paper-meta">
                        <span class="paper-year">${p.year}</span>
                        ${venue}
                    </div>
                    ${linkOpen}
                        <h2 class="paper-title">${highlightMatch(p.title, searchQuery)}</h2>
                    ${linkClose}
                    <p class="paper-authors">${highlightMatch(p.authors, searchQuery)}</p>
                    <div class="paper-tags">${tagsHtml}</div>
                    ${githubUrl ? `<a href="${githubUrl}" target="_blank" rel="noopener noreferrer" class="btn btn--outline btn--small github-btn"><img src="../images/github-logo.svg" alt="GitHub" style="width:16px;height:16px;vertical-align:middle;margin-right:6px;">GitHub</a>` : ''}
                </div>`;
            }).join('');

            const hasResults = filtered.length > 0;
            listContainer.style.display = hasResults ? '' : 'none';
            emptyState.classList.toggle('visible', !hasResults);

            if (searchQuery || activeTags.size > 0) {
                resultsInfo.textContent = `${filtered.length} of ${papers.length} papers`;
            } else {
                resultsInfo.textContent = `${papers.length} papers`;
            }
        }

        /* ── Filter logic ── */
        function getFilteredPapers() {
            return papers.filter(p => {
                if (activeTags.size > 0) {
                    const paperTags = new Set(p.tags || []);
                    for (const tag of activeTags) {
                        if (tag === '__github__') {
                            if (!(p.github_url || p.metadata?.github_url)) return false;
                        } else if (!paperTags.has(tag)) {
                            return false;
                        }
                    }
                }

                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    const searchable = [
                        p.title,
                        p.authors,
                        ...(p.tags || []),
                        p.venue || '',
                        String(p.year)
                    ].join(' ').toLowerCase();
                    return searchable.includes(q);
                }

                return true;
            });
        }

        /* ── Highlight matching text ── */
        function highlightMatch(text, query) {
            if (!query || !text) return text || '';
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<mark style="background:#fef08a;color:inherit;border-radius:2px;padding:0 1px">$1</mark>');
        }

        /* ── Events ── */
        searchInput.addEventListener('input', function () {
            searchQuery = this.value.trim();
            renderList();
        });

        tagsContainer.addEventListener('click', function (e) {
            const btn = e.target.closest('.tag-btn');
            if (!btn) return;

            const tag = btn.dataset.tag;
            if (activeTags.has(tag)) {
                activeTags.delete(tag);
            } else {
                activeTags.add(tag);
            }

            renderTags();
            renderList();
        });

        /* ── Init ── */
        loadPapers();
    })();
    </script>

    <script src="../js/site-config.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/base.js"></script>
</body>
</html>
